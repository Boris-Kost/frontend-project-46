name: Node.js CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: make lint
      - run: npm test -- --coverage --coverageReporters=lcov
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@02003573376dbb6028540509ac4734ccc60c871d
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=Boris-Kost_frontend-project-46
            -Dsonar.organization=boris-kost
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
